    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --md-primary: #FF6B35;
            --md-primary-container: #FFE5DC;
            --md-secondary: #00C9A7;
            --md-secondary-container: #C2FFF0;
            --md-tertiary: #FFD23F;
            --md-purple: #B75CFF;
            --md-blue: #4A90E2;
            --md-pink: #FF6B9D;
            --md-surface: #FFFBFF;
            --md-surface-variant: #F5F0EE;
            --md-on-surface: #201B17;
            --md-on-primary: #FFFFFF;
            --md-error: #FF5252;
            --md-shadow: rgba(255, 107, 53, 0.15);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #FFE5DC 0%, #FFF8F5 50%, #C2FFF0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 201, 167, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .game-container {
            position: relative;
            width: 90vw;
            max-width: 1200px;
            height: 70vh;
            max-height: 600px;
            background: var(--md-surface);
            border-radius: 48px;
            box-shadow: 
                0 24px 48px var(--md-shadow),
                0 8px 16px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            overflow: hidden;
            animation: slideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .game-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 32px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            background: linear-gradient(to bottom, var(--md-surface) 0%, transparent 100%);
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: var(--md-primary);
            letter-spacing: -1px;
            text-shadow: 2px 2px 0 var(--md-secondary);
        }

        .sound-toggle {
            position: absolute;
            top: 100px;
            right: 48px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--md-secondary) 0%, #00A88A 100%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(0, 201, 167, 0.3);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 15;
        }

        .sound-toggle:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 201, 167, 0.4);
        }

        .score {
            font-family: 'Space Mono', monospace;
            font-size: 48px;
            font-weight: 700;
            color: var(--md-on-surface);
            letter-spacing: -2px;
            background: linear-gradient(135deg, var(--md-primary) 0%, var(--md-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 251, 255, 0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .start-screen h1, .game-over-screen h1 {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--md-primary) 0%, var(--md-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: bounce 1.2s ease-in-out infinite;

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }

        .start-screen p, .game-over-screen p {
            font-size: 24px;

        .btn {

                0 8px 24px rgba(255, 107, 53, 0.3),

            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;

        @media (max-width: 768px) {
            .game-container { width: 100vw; height: 100vh; max-width: 100vw; max-height: 100vh; border-radius: 0; }
            .game-header { padding: 16px 20px; }
            .logo { font-size: 20px; }
            .score { font-size: 32px; }
            .sound-toggle { top: 70px; right: 20px; width: 48px; height: 48px; font-size: 20px; }
            .start-screen h1, .game-over-screen h1 { font-size: 48px; }
            .btn { padding: 16px 40px; font-size: 18px; }
            .jump-button { display: flex; align-items: center; justify-content: center; }
        }

<body>
    <header class="seo-content">

    <main>
    <div class="game-container">
        <div class="game-header">
            <div class="logo">PIXEL RUNNER</div>
            <div class="score" id="score">0</div>
        </div>

        <button class="sound-toggle" id="soundToggle" title="Son activé/désactivé">🔊</button>

        <canvas id="gameCanvas"></canvas>

        <div class="start-screen" id="startScreen">
            <h1>🎮 PIXEL RUNNER</h1>
            <p>Sautez par-dessus les obstacles et attrapez les pièces !</p>
            <button class="btn" id="startBtn"><span>JOUER</span></button>
            <div class="instructions">Appuyez sur ESPACE, cliquez ou tapez sur l'écran pour sauter</div>
        </div>

        <div class="game-over-screen hidden" id="gameOverScreen">
            <h1>💥 GAME OVER</h1>
            <div class="final-score" id="finalScore">Score: 0</div>
            <button class="btn" id="restartBtn"><span>REJOUER</span></button>
        </div>

        <div class="signature">Ingénieusement fait par Maxence Dardenne ! 6C</div>
    </div>
    </main>

    <script>
        // ===== SYSTÈME DE SONS RÉTRO =====
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let soundEnabled = true;

        function playJumpSound() {
            if (!soundEnabled) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode); gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(600, audioContext.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            oscillator.type = 'square'; oscillator.start(audioContext.currentTime); oscillator.stop(audioContext.currentTime + 0.1);
        }

        function playScoreSound() {
            if (!soundEnabled) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode); gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.05);
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
            oscillator.type = 'sine'; oscillator.start(audioContext.currentTime); oscillator.stop(audioContext.currentTime + 0.15);
        }

        function playGameOverSound() {
            if (!soundEnabled) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode); gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.5);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            oscillator.type = 'sawtooth'; oscillator.start(audioContext.currentTime); oscillator.stop(audioContext.currentTime + 0.5);
        }

        function playStartSound() {
            if (!soundEnabled) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode); gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(400, audioContext.currentTime + 0.1);
            oscillator.frequency.setValueAtTime(600, audioContext.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.25, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            oscillator.type = 'square'; oscillator.start(audioContext.currentTime); oscillator.stop(audioContext.currentTime + 0.3);
        }

        let backgroundMusicNodes = null;
        function playBackgroundMusic() {
            if (!soundEnabled || backgroundMusicNodes) return;
            const notes = [523.25, 659.25, 783.99, 659.25];
            const noteDuration = 0.3; let currentNote = 0;
            function playNote() {
                if (!soundEnabled || !backgroundMusicNodes) return;
                const oscillator = audioContext.createOscillator(); const gainNode = audioContext.createGain();
                oscillator.connect(gainNode); gainNode.connect(audioContext.destination);
                oscillator.frequency.setValueAtTime(notes[currentNote], audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + noteDuration);
                oscillator.type = 'triangle'; oscillator.start(audioContext.currentTime); oscillator.stop(audioContext.currentTime + noteDuration);
                currentNote = (currentNote + 1) % notes.length;
                backgroundMusicNodes.timeout = setTimeout(playNote, noteDuration * 1000);
            }
            backgroundMusicNodes = { timeout: null }; playNote();
        }
        
        function stopBackgroundMusic() {
            if (backgroundMusicNodes && backgroundMusicNodes.timeout) {
                clearTimeout(backgroundMusicNodes.timeout); backgroundMusicNodes = null;
            }
        }

        const soundToggle = document.getElementById('soundToggle');
        soundToggle.addEventListener('click', () => {
            soundEnabled = !soundEnabled; soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
            if (soundEnabled && gameRunning) playBackgroundMusic(); else stopBackgroundMusic();
        });

        // ===== ENGIN DU JEU =====
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');

        function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        resizeCanvas(); window.addEventListener('resize', resizeCanvas);

        let gameRunning = false;
        let score = 0;
        let gameSpeed = 7;
        let gravity = 0.8;

        const player = { x: 100, y: 0, width: 50, height: 50, velocityY: 0, jumping: false, color: '#FF6B35' };

        // Tableaux d'entités dynamiques
        let obstacles = [];
        let coins = [];
        let floatingTexts = [];
        let frameCount = 0;
        let nextSpawnFrame = 0;
        let groundY;

        function initGame() {
            groundY = canvas.height - 100;
            player.y = groundY - player.height;
            player.velocityY = 0;
            player.jumping = false;
            obstacles = [];
            coins = [];
            floatingTexts = [];
            score = 0;
            gameSpeed = 7;
            frameCount = 0;
            nextSpawnFrame = 60; // Premier pattern un peu plus éloigné pour se préparer
            scoreElement.textContent = '0';
            stopBackgroundMusic();
        }

        function startGame() {
            initGame(); gameRunning = true;
            startScreen.classList.add('hidden'); gameOverScreen.classList.add('hidden');
            playStartSound(); playBackgroundMusic(); gameLoop();
        }

        function endGame() {
            gameRunning = false; finalScoreElement.textContent = `Score: ${score}`;
            gameOverScreen.classList.remove('hidden'); stopBackgroundMusic(); playGameOverSound();
        }

        function jump() {
            if (!player.jumping && gameRunning) { player.velocityY = -16; player.jumping = true; playJumpSound(); }
        }

        // Contrôles Événements
        document.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
        canvas.addEventListener('click', jump);
        document.getElementById('jumpButton').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // --- SYSTÈME ALÉATOIRE SÉCURISÉ PAR PATTERNS ACCESSIBLES ---
        function generateRandomCoursePattern() {
            const patternType = Math.floor(Math.random() * 5);
            
            // Couleurs et formes pour harmonie graphique
            const shapes = ['rectangle', 'triangle', 'circle'];
            const obstacleColors = [
                { color: '#00C9A7', colorDark: '#00A88A', shadow: 'rgba(0, 201, 167, 0.3)' },
                { color: '#B75CFF', colorDark: '#9D47E8', shadow: 'rgba(183, 92, 255, 0.3)' },
                { color: '#4A90E2', colorDark: '#3A7BC8', shadow: 'rgba(74, 144, 226, 0.3)' },
                { color: '#FF6B9D', colorDark: '#E85588', shadow: 'rgba(255, 107, 157, 0.3)' }
            ];

            const randObsColor = obstacleColors[Math.floor(Math.random() * obstacleColors.length)];
            const randShape = shapes[Math.floor(Math.random() * shapes.length)];
            const obsHeight = 40 + Math.random() * 35; // Hauteur légèrement lissée
            const obsWidth = 35 + Math.random() * 15;

            switch(patternType) {
                case 0: // Motif : Obstacle simple + pièce standard au-dessus
                    obstacles.push({
                        x: canvas.width, y: groundY - obsHeight, width: obsWidth, height: obsHeight,
                        shape: randShape, color: randObsColor.color, colorDark: randObsColor.colorDark, shadowColor: randObsColor.shadow
                    });
                    coins.push({ x: canvas.width + obsWidth/2, y: groundY - obsHeight - 55, value: 10, radius: 14, angle: Math.random(), bounceSpeed: 0.05 });
                    break;
                
                case 1: // Motif : Une belle ligne au sol de 3 pièces respirable (+10)
                    for (let i = 0; i < 3; i++) {
                        coins.push({ x: canvas.width + (i * 70), y: groundY - 25, value: 10, radius: 14, angle: Math.random() + i, bounceSpeed: 0.06 });
                    }
                    break;

                case 2: // Motif : Une Super Pièce (+20) en hauteur isolée
                    coins.push({ x: canvas.width, y: groundY - 110, value: 20, radius: 19, angle: Math.random(), bounceSpeed: 0.04 });
                    break;

                case 3: // Motif : Obstacle avec pièce un peu plus loin (sécurisé, pas de double obstacle serré)
                    obstacles.push({
                        x: canvas.width, y: groundY - obsHeight, width: obsWidth, height: obsHeight,
                        shape: 'rectangle', color: randObsColor.color, colorDark: randObsColor.colorDark, shadowColor: randObsColor.shadow
                    });
                    coins.push({ x: canvas.width + obsWidth + 80, y: groundY - 25, value: 10, radius: 14, angle: Math.random(), bounceSpeed: 0.05 });
                    break;

                case 4: // Motif : Un obstacle circulaire amusant suivi d'une Super Pièce en l'air
                    obstacles.push({
                        x: canvas.width, y: groundY - 50, width: 50, height: 50,
                        shape: 'circle', color: '#FFD23F', colorDark: '#F0C030', shadowColor: 'rgba(255, 210, 63, 0.3)'
                    });
                    coins.push({ x: canvas.width + 140, y: groundY - 100, value: 20, radius: 19, angle: Math.random(), bounceSpeed: 0.04 });
                    break;
            }
        }

        // --- TEXTE FLOTTANT À LA COLLECTE ---
        function addFloatingText(x, y, text, color) {
            floatingTexts.push({ x: x, y: y, text: text, color: color, alpha: 1, vy: -2 });
        }

        // Dessiner le joueur
        function drawPlayer() {
            ctx.save();
            ctx.shadowColor = 'rgba(255, 107, 53, 0.3)'; ctx.shadowBlur = 20; ctx.shadowOffsetY = 10;
            const gradient = ctx.createLinearGradient(player.x, player.y, player.x, player.y + player.height);
            gradient.addColorStop(0, '#FF6B35'); gradient.addColorStop(1, '#FF8560');
            ctx.fillStyle = gradient; ctx.beginPath(); ctx.roundRect(player.x, player.y, player.width, player.height, 12); ctx.fill();
            ctx.shadowBlur = 0; ctx.fillStyle = '#FFFFFF'; ctx.beginPath();
            ctx.arc(player.x + 15, player.y + 18, 8, 0, Math.PI * 2); ctx.arc(player.x + 35, player.y + 18, 8, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#201B17'; ctx.beginPath();
            ctx.arc(player.x + 17, player.y + 18, 4, 0, Math.PI * 2); ctx.arc(player.x + 37, player.y + 18, 4, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#201B17'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.beginPath();
            ctx.arc(player.x + 25, player.y + 25, 12, 0.2, Math.PI - 0.2); ctx.stroke();
            ctx.restore();
        }

        // Dessiner un obstacle
        function drawObstacle(obs) {
            ctx.save(); ctx.shadowColor = obs.shadowColor; ctx.shadowBlur = 15; ctx.shadowOffsetY = 8;
            if (obs.shape === 'rectangle') {
                const gradient = ctx.createLinearGradient(obs.x, obs.y, obs.x, obs.y + obs.height);
                gradient.addColorStop(0, obs.color); gradient.addColorStop(1, obs.colorDark);
                ctx.fillStyle = gradient; ctx.beginPath(); ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 8); ctx.fill();
            } else if (obs.shape === 'triangle') {
                const gradient = ctx.createLinearGradient(obs.x, obs.y, obs.x, obs.y + obs.height);
                gradient.addColorStop(0, obs.color); gradient.addColorStop(1, obs.colorDark);
                ctx.fillStyle = gradient; ctx.beginPath(); ctx.moveTo(obs.x + obs.width / 2, obs.y);
                ctx.lineTo(obs.x + obs.width, obs.y + obs.height); ctx.lineTo(obs.x, obs.y + obs.height); ctx.closePath(); ctx.fill();
            } else if (obs.shape === 'circle') {
                const gradient = ctx.createRadialGradient(obs.x + obs.width/2, obs.y + obs.height/2, 0, obs.x + obs.width/2, obs.y + obs.height/2, obs.width/2);
                gradient.addColorStop(0, obs.color); gradient.addColorStop(1, obs.colorDark);
                ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(obs.x + obs.width / 2, obs.y + obs.height / 2, obs.width / 2, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }

        // DESSINER LES PIÈCES JAUNES EN ROTATION
        function drawCoin(coin) {
            ctx.save();
            const floatOffset = Math.sin(frameCount * coin.bounceSpeed) * 5;
            const currentY = coin.y + floatOffset;

            ctx.shadowColor = coin.value === 20 ? 'rgba(255, 107, 53, 0.4)' : 'rgba(212, 163, 24, 0.3)';
            ctx.shadowBlur = coin.value === 20 ? 16 : 10;
            ctx.shadowOffsetY = 4;

            ctx.translate(coin.x, currentY);
            ctx.scale(Math.sin(coin.angle), 1);

            const grad = ctx.createLinearGradient(-coin.radius, -coin.radius, coin.radius, coin.radius);
            grad.addColorStop(0, '#FFDE00'); 
            grad.addColorStop(0.5, '#FFB703');
            grad.addColorStop(1, '#FB8500');

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, coin.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#FFF39A';
            ctx.lineWidth = coin.value === 20 ? 3 : 2;
            ctx.beginPath();
            ctx.arc(0, 0, coin.radius * 0.75, 0, Math.PI * 2);
            ctx.stroke();

            if (coin.value === 20) {
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 15px Outfit';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('★', 0, 0);
            }

            ctx.restore();
        }

        function drawGround() {
            ctx.fillStyle = '#F5F0EE'; ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            const gradient = ctx.createLinearGradient(0, groundY - 4, 0, groundY + 4);
            gradient.addColorStop(0, '#FFD23F'); gradient.addColorStop(1, '#FFC107');
            ctx.fillStyle = gradient; ctx.fillRect(0, groundY - 4, canvas.width, 8);
            ctx.fillStyle = 'rgba(255, 107, 53, 0.1)';
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.arc(i + (frameCount % 40), groundY + 30, 3, 0, Math.PI * 2); ctx.fill();
            }
        }

        function drawBackground() {
            const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#FFF8F5'); skyGradient.addColorStop(1, '#FFE5DC');
            ctx.fillStyle = skyGradient; ctx.fillRect(0, 0, canvas.width, groundY);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            const cloudOffset = (frameCount * 0.5) % (canvas.width + 200);
            ctx.beginPath(); ctx.arc(cloudOffset - 100, 100, 30, 0, Math.PI * 2); ctx.arc(cloudOffset - 70, 95, 40, 0, Math.PI * 2); ctx.arc(cloudOffset - 40, 100, 30, 0, Math.PI * 2); ctx.fill();
        }

        function checkCollision(obs) {
            if (obs.shape === 'rectangle') {
                return player.x < obs.x + obs.width && player.x + player.width > obs.x && player.y < obs.y + obs.height && player.y + player.height > obs.y;
            } else if (obs.shape === 'circle') {
                const cx = obs.x + obs.width / 2; const cy = obs.y + obs.height / 2; const radius = obs.width / 2;
                const closestX = Math.max(player.x, Math.min(cx, player.x + player.width));
                const closestY = Math.max(player.y, Math.min(cy, player.y + player.height));
                return ((cx - closestX)**2 + (cy - closestY)**2) < (radius**2);
            } else if (obs.shape === 'triangle') {
                return player.x < obs.x + obs.width - 5 && player.x + player.width > obs.x + 5 && player.y < obs.y + obs.height && player.y + player.height > obs.y + 10;
            }
        }

        function checkCoinCollision(coin) {
            const floatOffset = Math.sin(frameCount * coin.bounceSpeed) * 5;
            const coinY = coin.y + floatOffset;
            return player.x < coin.x + coin.radius &&
                   player.x + player.width > coin.x - coin.radius &&
                   player.y < coinY + coin.radius &&
                   player.y + player.height > coinY - coin.radius;
        }

        // Boucle Principale
        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawGround();

            // Gravité et déplacement joueur
            player.velocityY += gravity; player.y += player.velocityY;
            if (player.y >= groundY - player.height) { player.y = groundY - player.height; player.velocityY = 0; player.jumping = false; }
            drawPlayer();

            frameCount++;

            // Génération avec ESPACEMENT SÉCURISÉ proportionnel à la vitesse
            if (frameCount >= nextSpawnFrame) {
                generateRandomCoursePattern();
                
                // CORRECTION : L'espace minimum requis s'adapte à gameSpeed pour donner le temps de sauter !
                let minSpacing = 65 + (gameSpeed * 3); 
                nextSpawnFrame = frameCount + Math.floor(minSpacing + Math.random() * 40);
            }

            // Gestion dynamique et affichage des pièces jaunes
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].x -= gameSpeed;
                coins[i].angle += 0.08;

                if (coins[i].x + coins[i].radius < 0) {
                    coins.splice(i, 1);
                } else {
                    drawCoin(coins[i]);
                    if (checkCoinCollision(coins[i])) {
                        score += coins[i].value;
                        scoreElement.textContent = score;
                        playScoreSound();
                        addFloatingText(coins[i].x, coins[i].y, `+${coins[i].value}`, coins[i].value === 20 ? '#FFD23F' : '#00C9A7');
                        coins.splice(i, 1);
                    }
                }
            }

            // Gestion et affichage des obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;

                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score += 5; 
                    scoreElement.textContent = score;
                    
                    // Vitesse progressive calculée avec soin
                    if (score % 60 === 0) {
                        gameSpeed = Math.min(14, gameSpeed + 0.6); // Vitesse max bridée à 14 pour rester jouable
                    }
                } else {
                    drawObstacle(obstacles[i]);
                    if (checkCollision(obstacles[i])) { endGame(); return; }
                }
            }

            // Textes flottants
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let t = floatingTexts[i];
                t.y += t.vy;
                t.alpha -= 0.025;
                if (t.alpha <= 0) {
                    floatingTexts.splice(i, 1);
                } else {
                    ctx.save();
                    ctx.globalAlpha = t.alpha;
                    ctx.fillStyle = t.color;
                    ctx.font = 'bold 24px Space Mono, monospace';
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
                    ctx.shadowBlur = 4;
                    ctx.fillText(t.text, t.x, t.y);
                    ctx.restore();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
                this.moveTo(x + radius, y); this.lineTo(x + width - radius, y);
                this.quadraticCurveTo(x + width, y, x + width, y + radius); this.lineTo(x + width, y + height - radius);
                this.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); this.lineTo(x + radius, y + height);
                this.quadraticCurveTo(x, y + height, x, y + height - radius); this.lineTo(x, y + radius);
                this.quadraticCurveTo(x, y, x + radius, y);
            };
        }
    </script>
</body>
